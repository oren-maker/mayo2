<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Social Groups Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --bg: #0a0a12; --bg2: #12121c; --bg3: #1a1a28; --border: #22223a; --text: #e8e8f0; --dim: #9a9ab0; --mute: #6a6a80; --green: #25d366; --green2: #128c7e; --cyan: #00d4ff; --red: #ef4444; --ig1: #f09433; --ig2: #e6683c; --ig3: #dc2743; --ig4: #cc2366; --ig5: #bc1888; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Heebo", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, var(--bg2), var(--bg)); flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 22px; font-weight: 800; }
  h1 .wa { color: var(--green); }
  .health { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; cursor: pointer; }
  .health:hover { border-color: var(--green); }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.off { background: var(--red); box-shadow: 0 0 8px var(--red); }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: nowrap; }
  .tab { padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; background: var(--bg3); border: 1px solid var(--border); color: var(--dim); cursor: pointer; white-space: nowrap; flex: 1; text-align: center; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .tab.active { background: var(--green); color: white; border-color: var(--green); }
  body.ig-mode .tab.active { background: linear-gradient(135deg, var(--ig1), var(--ig3), var(--ig5)); color: white; border-color: transparent; }

  .platform-switch { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 3px; }
  .platform-btn { padding: 8px 16px; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--dim); white-space: nowrap; transition: all 0.15s; }
  .platform-btn.active[data-plat="whatsapp"], .platform-btn#plat-wa.active { background: var(--green); color: white; }
  .platform-btn#plat-ig.active { background: linear-gradient(135deg, var(--ig1), var(--ig3), var(--ig5)); color: white; }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }

  label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  input, textarea, select { width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; margin-bottom: 12px; }
  input:focus, textarea:focus { outline: none; border-color: var(--green); }
  textarea { resize: vertical; min-height: 80px; }

  button { padding: 10px 18px; border: none; border-radius: 8px; font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: var(--green2); }
  .btn-ghost { background: var(--bg3); color: var(--dim); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--green); color: var(--text); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

  .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .group-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.15s; }
  .group-card:hover { border-color: var(--green); transform: translateY(-2px); }
  .group-card .name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .group-card .meta { font-size: 12px; color: var(--dim); }

  table { width: 100%; border-collapse: collapse; }
  th { background: var(--bg3); color: var(--cyan); font-size: 12px; text-align: right; padding: 10px 12px; border-bottom: 2px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover td { background: rgba(37,211,102,0.05); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--bg3); }

  .loading { display: flex; align-items: center; gap: 10px; color: var(--dim); font-size: 14px; padding: 30px; justify-content: center; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Skeleton loaders */
  .skeleton { background: linear-gradient(90deg, var(--bg3) 0%, var(--bg2) 50%, var(--bg3) 100%); background-size: 200% 100%; animation: skeleton 1.2s ease-in-out infinite; border-radius: 8px; }
  @keyframes skeleton { 0%{background-position:200% 0}100%{background-position:-200% 0} }
  .skeleton-card { height: 70px; margin-bottom: 10px; }
  .skeleton-row { height: 44px; margin-bottom: 6px; }

  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px; border-radius: 8px; font-size: 13px; margin: 12px 0; }
  .success { background: rgba(37,211,102,0.1); border: 1px solid rgba(37,211,102,0.3); color: #86efac; padding: 12px; border-radius: 8px; font-size: 13px; margin: 12px 0; }
  .empty { text-align: center; color: var(--mute); padding: 60px; font-size: 14px; }

  .qr-wrap { text-align: center; padding: 20px; }
  .qr-wrap img { max-width: 280px; border-radius: 12px; background: white; padding: 16px; }

  .actions-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

  .broadcast-area { margin-top: 16px; }
  .broadcast-area textarea { min-height: 100px; }
  .selected-count { font-size: 13px; color: var(--green); font-weight: 600; margin: 8px 0; }

  @media (max-width: 720px) {
    header { padding: 14px 14px; flex-wrap: wrap; gap: 8px }
    h1 { font-size: 18px }
    .platform-switch { width: 100%; justify-content: stretch }
    .platform-btn { flex: 1; padding: 10px; text-align: center }
    .container { padding: 14px 10px }
    .tabs { gap: 3px; flex-wrap: nowrap }
    .tab { padding: 6px 4px; font-size: 11px; border-radius: 6px }
    .card { padding: 14px }
    .card h2 { font-size: 15px }
    .actions-row { flex-wrap: wrap; gap: 6px }
    .actions-row button, .actions-row label, .actions-row a { flex: 1; min-width: 0; font-size: 12px; padding: 8px 10px; white-space: nowrap }
    .group-grid { grid-template-columns: 1fr !important }
    table { font-size: 11px }
    th, td { padding: 6px 4px }
    .avatar { width: 30px; height: 30px }
    input, textarea, select { font-size: 14px }
    .modal-bg { padding: 8px }
    .prompt-modal .box { padding: 16px; max-width: 100% }
    .health { padding: 6px 10px; font-size: 11px }
  }
  @media (max-width: 600px) { .group-grid { grid-template-columns: 1fr } }
  .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-val { font-size: 28px; font-weight: 800; line-height: 1 }
  .stat-lbl { font-size: 11px; color: var(--dim); margin-top: 6px; }

  .ig-engine-card { display: block; cursor: pointer; }
  .ig-engine-card .ig-engine-inner {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px; background: var(--bg3);
    border: 2px solid var(--border); border-radius: 12px;
    transition: all 0.15s; position: relative;
  }
  .ig-engine-card:hover .ig-engine-inner { border-color: var(--ig3); background: var(--bg2); }
  .ig-engine-card.selected .ig-engine-inner {
    border-color: transparent;
    background: linear-gradient(135deg, rgba(240,148,51,0.12), rgba(220,39,67,0.12), rgba(188,24,136,0.12));
    box-shadow: 0 0 0 2px var(--ig3), 0 8px 24px rgba(220,39,67,0.2);
  }
  .ig-engine-check {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: transparent; font-weight: 900; font-size: 14px;
    flex-shrink: 0;
  }
  .ig-engine-card.selected .ig-engine-check {
    background: linear-gradient(135deg, var(--ig1), var(--ig3)); border-color: transparent; color: white;
  }
</style>
</head>
<body>
<header>
  <h1>🌐 Social Groups <span class="wa">Manager</span></h1>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="platform-switch">
      <div class="platform-btn active" id="plat-wa" onclick="switchPlatform('whatsapp')">📱 וואטסאפ</div>
      <div class="platform-btn" id="plat-ig" onclick="switchPlatform('instagram')">📷 אינסטגרם</div>
    </div>
    <div class="health" onclick="checkHealth()">
      <div class="dot" id="health-dot"></div>
      <span id="health-text">בודק...</span>
    </div>
  </div>
</header>

<div class="container">
  <div class="tabs" id="wa-tabs">
    <div class="tab active" onclick="switchTab('connect')">🔗 חיבור</div>
    <div class="tab" onclick="switchTab('groups')">👥 קבוצות</div>
    <div class="tab" onclick="switchTab('members')">📋 חברים</div>
    <div class="tab" onclick="switchTab('saved')">💾 שמורות</div>
    <div class="tab" onclick="STATE.activeBrandId=null;switchTab('brands')">🏷️ מותגים</div>
    <div class="tab" onclick="switchTab('archive')">📦 ארכיון</div>
    <div class="tab" onclick="switchTab('send')">✉️ שליחה</div>
  </div>
  <div class="tabs" id="ig-tabs" style="display:none">
    <div class="tab active" onclick="switchIgTab('connect')">🔗 חיבור</div>
    <div class="tab" onclick="switchIgTab('followers')">👥 עוקבים</div>
    <div class="tab" onclick="switchIgTab('scrape')">🔍 סקרייפינג פרופיל</div>
    <div class="tab" onclick="switchIgTab('dm')">✉️ DMs</div>
    <div class="tab" onclick="switchIgTab('content')">📸 תוכן</div>
    <div class="tab" onclick="switchIgTab('agent')">🤖 Agent</div>
  </div>
  <div id="content"></div>
</div>

<script>
let STATE = {
  platform: "whatsapp",
  tab: "connect",
  igTab: "connect",
  sessions: [],
  activeSession: null,
  groups: [],
  selectedGroup: null,
  members: [],
  selectedMembers: new Set(),
  igAccount: null,
  igFollowers: [],
  igSelectedFollowers: new Set(),
  igScrapeTarget: "",
  igScrapeResult: null,
};

function switchPlatform(p, _noHash) {
  STATE.platform = p;
  document.getElementById("plat-wa").classList.toggle("active", p === "whatsapp");
  document.getElementById("plat-ig").classList.toggle("active", p === "instagram");
  document.getElementById("wa-tabs").style.display = p === "whatsapp" ? "flex" : "none";
  document.getElementById("ig-tabs").style.display = p === "instagram" ? "flex" : "none";
  document.body.classList.toggle("ig-mode", p === "instagram");
  if (!_noHash) updateHash();
  render();
  setTimeout(() => {
    if (p === "instagram" && STATE.igTab === "connect") {
      selectIgAuth(document.querySelector("input[name='ig-auth']:checked")?.value || "token");
      selectIgEngine(document.querySelector("input[name='ig-engine']:checked")?.value || "apify");
    }
  }, 50);
}

function switchIgTab(t, _noHash) {
  STATE.igTab = t;
  document.querySelectorAll("#ig-tabs .tab").forEach((el, i) =>
    el.classList.toggle("active", ["connect","followers","scrape","dm","content","agent"][i] === t)
  );
  if (!_noHash) updateHash();
  render();
  setTimeout(() => {
    if (t === "connect") {
      selectIgAuth(document.querySelector("input[name='ig-auth']:checked")?.value || "token");
      selectIgEngine(document.querySelector("input[name='ig-engine']:checked")?.value || "apify");
    }
  }, 50);
}

function switchTab(t, _noHash) {
  STATE.tab = t;
  const tabs = ["connect","groups","members","saved","brands","archive","send"];
  document.querySelectorAll("#wa-tabs .tab").forEach((el, i) => el.classList.toggle("active", tabs[i] === t));
  if (!_noHash) updateHash();
  render();
}

function render() {
  const c = document.getElementById("content");
  if (STATE.platform === "instagram") {
    switch (STATE.igTab) {
      case "connect": c.innerHTML = renderIgConnect(); break;
      case "followers": c.innerHTML = renderIgFollowers(); break;
      case "scrape": c.innerHTML = renderIgScrape(); break;
      case "dm": c.innerHTML = renderIgDm(); break;
      case "content": c.innerHTML = renderIgContent(); break;
      case "agent": c.innerHTML = renderIgAgent(); break;
    }
    return;
  }
  switch (STATE.tab) {
    case "connect": c.innerHTML = renderConnect(); setTimeout(() => loadSessions(false), 50); break;
    case "groups": c.innerHTML = renderGroups(); break;
    case "members": c.innerHTML = renderMembers(); break;
    case "saved": c.innerHTML = renderSaved(); loadSavedGroups(); break;
    case "archive": c.innerHTML = renderArchive(); loadArchivedGroups(); break;
    case "brands": c.innerHTML = renderBrands(); loadBrands(); break;
    case "send": c.innerHTML = renderSend(); break;
  }
}

function renderArchive() {
  return `<div class="card">
    <h2>📦 קבוצות בארכיון</h2>
    <div style="font-size:12px;color:var(--dim);margin-bottom:14px">קבוצות שהועברו לארכיון — ניתנות לשחזור בכל עת</div>
    <div id="archived-list"><div class="loading"><div class="spinner"></div>טוען...</div></div>
  </div>`;
}

// ========== HASH ROUTING ==========
function updateHash() {
  let hash = "/" + STATE.platform;
  if (STATE.platform === "whatsapp") {
    hash += "/" + STATE.tab;
    if (STATE.tab === "brands" && STATE.activeBrandId) hash += "/" + STATE.activeBrandId;
    if (STATE.tab === "members" && STATE.selectedGroup) hash += "/" + encodeURIComponent(STATE.selectedGroup);
  } else {
    hash += "/" + STATE.igTab;
  }
  const current = window.location.hash.slice(1);
  if (current !== hash) window.location.hash = hash;
}

function applyHash() {
  const raw = window.location.hash.slice(1) || "/whatsapp/connect";
  const parts = raw.split("/").filter(Boolean);
  const platform = parts[0] === "instagram" ? "instagram" : "whatsapp";
  switchPlatform(platform, true);
  if (platform === "whatsapp") {
    const tab = parts[1] || "connect";
    const valid = ["connect","groups","members","saved","brands","archive","send"];
    STATE.tab = valid.includes(tab) ? tab : "connect";
    if (STATE.tab === "brands" && parts[2]) STATE.activeBrandId = parts[2];
    else if (STATE.tab !== "brands") STATE.activeBrandId = null;
    if (STATE.tab === "members" && parts[2]) STATE.selectedGroup = decodeURIComponent(parts[2]);
    switchTab(STATE.tab, true);
  } else {
    const igTab = parts[1] || "connect";
    const valid = ["connect","followers","scrape","dm","content","agent"];
    STATE.igTab = valid.includes(igTab) ? igTab : "connect";
    switchIgTab(STATE.igTab, true);
  }
}
window.addEventListener("hashchange", applyHash);

// ========== BRANDS TAB ==========
function renderBrands() {
  if (STATE.activeBrandId) return renderBrandDetail();
  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2>🏷️ מותגים</h2>
        <button class="btn-green" onclick="createBrand()">➕ צור מותג חדש</button>
      </div>
      <div id="brands-list"><div class="loading"><div class="spinner"></div>טוען...</div></div>
    </div>
  `;
}

async function loadBrands() {
  try {
    const r = await (await fetch("/api/brands")).json();
    STATE.brands = r.brands || [];
    const el = document.getElementById("brands-list");
    if (!el) return;
    if (!STATE.brands.length) { el.innerHTML = '<div class="empty">אין מותגים. לחץ "צור מותג חדש"</div>'; return; }
    const fmtAgo = (ts) => {
      if (!ts) return "—";
      const diff = Date.now() - new Date(ts).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return "לפני רגע";
      if (m < 60) return `לפני ${m} דק'`;
      const h = Math.floor(m / 60);
      if (h < 24) return `לפני ${h} שע'`;
      const d = Math.floor(h / 24);
      return `לפני ${d} ימים`;
    };
    el.innerHTML = STATE.brands.map(b => `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px" onclick="openBrand('${b.id}')">
        <div style="width:48px;height:48px;border-radius:12px;background:${b.color||'var(--green)'};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🏷️</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:16px;margin-bottom:2px">${esc(b.name)}</div>
          <div style="font-size:12px;color:var(--dim)">${b.group_count} קבוצות · ${b.total_members} חברים (כולל כפולים)</div>
          <div style="font-size:11px;color:var(--dim);margin-top:4px" title="${b.latest_saved_at ? new Date(b.latest_saved_at).toLocaleString("he-IL") : ""}">
            🔄 רענון אחרון: <b style="color:${b.latest_saved_at ? 'var(--cyan)' : 'var(--dim)'}">${fmtAgo(b.latest_saved_at)}</b>
          </div>
        </div>
        <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
          <button class="btn-ghost" onclick="editBrand('${b.id}')">✏️</button>
          <button class="btn-red" onclick="deleteBrand('${b.id}')">🗑</button>
        </div>
      </div>
    `).join("");
  } catch (e) {
    document.getElementById("brands-list").innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

async function createBrand() {
  const name = prompt("שם מותג (לדוגמה: Sun Tribe):");
  if (!name) return;
  const r = await fetch("/api/brands", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name }),
  });
  if (r.ok) { flash("✅ נוצר"); loadBrands(); }
}

async function editBrand(id) {
  const b = STATE.brands.find(x => x.id === id);
  const name = prompt("שם חדש:", b?.name || "");
  if (!name) return;
  await fetch(`/api/brands/${id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name }) });
  loadBrands();
}

async function deleteBrand(id) {
  if (!confirm("למחוק את המותג? הקבוצות עצמן לא יימחקו")) return;
  await fetch(`/api/brands/${id}`, { method: "DELETE" });
  loadBrands();
}

async function openBrand(id) {
  STATE.activeBrandId = id;
  updateHash();
  render();
}

function renderBrandDetail() {
  setTimeout(tabLoadBrandDetail, 50);
  return `
    <div class="card">
      <button class="btn-ghost" onclick="STATE.activeBrandId=null;render()" style="margin-bottom:12px">← חזרה למותגים</button>
      <div id="brand-detail"><div class="loading"><div class="spinner"></div>טוען...</div></div>
    </div>
  `;
}

function tabLoadBrandDetail(force) {
  const id = STATE.activeBrandId;
  if (!id) return;
  Promise.all([
    fetch(`/api/brands/${id}/stats${force ? "?refresh=1" : ""}`).then(r => r.json()),
    fetch(`/api/brands/${id}/log`).then(r => r.json()),
  ]).then(([stats, logR]) => {
    const el = document.getElementById("brand-detail");
    if (!el) return;
    if (stats.error) { el.innerHTML = `<div class="error">${esc(stats.error)}</div>`; return; }
    const b = stats.brand;
    const log = logR.log || [];
    const leaversCount = log.filter(l => l.type === "member_left").length;
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div style="width:56px;height:56px;border-radius:14px;background:${b.color||'var(--green)'};display:flex;align-items:center;justify-content:center;font-size:26px">🏷️</div>
        <div style="flex:1;min-width:0">
          <h2 style="margin:0">${esc(b.name)}</h2>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">קבוצות עודכנו: ${stats.latest_saved_at ? new Date(stats.latest_saved_at).toLocaleString("he-IL") : "—"}</div>
        </div>
        <button class="btn-ghost" onclick="tabLoadBrandDetail(true)" style="flex-shrink:0">🔄 רענן</button>
      </div>
      <div style="font-size:11px;color:var(--dim);background:var(--bg3);padding:6px 12px;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;gap:8px">
        <span>📊 סטטיסטיקות עודכנו:</span>
        <b>${stats.updatedAt ? new Date(stats.updatedAt).toLocaleString("he-IL") : "—"}</b>
        ${stats.cached ? '<span style="color:var(--cyan)">· 💾 מקאש</span>' : '<span style="color:var(--green)">· ✓ חדש</span>'}
        <span style="margin-right:auto">רענון אוטומטי כל שעה</span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px">

                const m = Math.floor(diff / 60000);
                if (m < 1) return "לפני רגע";
                if (m < 60) return `לפני ${m} דק'`;
                const h = Math.floor(m / 60);
                if (h < 24) return `לפני ${h} שע'`;
                const d = Math.floor(h / 24);

              const stale = g.savedAt && (Date.now() - new Date(g.savedAt).getTime()) > 24*60*60*1000;
              // Badges: today's counts if any; else fall back to last refresh's delta

              const badgeLabel = hasToday ? "שינויים היום" : (g.lastDelta?.at ? `שינויים ברענון האחרון (${new Date(g.lastDelta.at).toLocaleString('he-IL')})` : "");

                  ${badgeL ? `<span style="background:rgba(239,68,68,0.15);color:var(--red);padding:1px 6px;border-radius:8px">🔴 -${badgeL}</span>` : ''}

                    ${deltaBadges}

                  <div style="font-size:11px;color:var(--dim)">${g.memberCount||0} חברים</div>
                  <div style="font-size:11px;margin-top:2px" title="${g.savedAt ? new Date(g.savedAt).toLocaleString('he-IL') : ''}">

                  </div>
                </div>
                <button class="btn-ghost" style="padding:4px 10px;font-size:11px" title="לוג שינויים יומי" onclick="openGroupDailyLog('${g.groupId}','${esc(g.groupName||'')}')">📅</button>

            `;}).join("") || '<div class="empty">אין קבוצות במותג. הוסף מהטאב קבוצות →</div>'}
          </div>
          <button class="btn-green" style="width:100%;margin-top:10px" onclick="addGroupToBrandPrompt('${b.id}')">➕ שייך קבוצה למותג</button>
        </div>

        <div>
          <h3 style="font-size:14px;margin-bottom:10px;color:var(--dim)">📜 לוג עדכונים (${log.length})</h3>
          <div style="max-height:500px;overflow-y:auto">
            ${log.length ? log.map(l => `

                <span style="color:var(--dim)">${new Date(l.at).toLocaleString("he-IL")}</span>
                <strong style="color:${logColor(l.type)}">${logLabel(l.type)}</strong>
                ${l.groupName ? '<span style="color:var(--dim)">· ' + esc(l.groupName) + '</span>' : ''}
                ${l.removed !== undefined ? '<span style="color:var(--green)">· הוסרו ' + l.removed + '</span>' : ''}
                ${l.failed ? '<span style="color:var(--red)">· נכשלו ' + l.failed + '</span>' : ''}
                ${l.count ? '<span style="color:var(--dim)">· ' + l.count + ' חברים</span>' : ''}
                ${l.phone ? '<span style="color:var(--dim)">· ' + esc(l.phone) + '</span>' : ''}
                ${l.type === "duplicates_removed" ? `<button class="btn-ghost" style="padding:2px 10px;font-size:11px;margin-right:auto" onclick="openRemovalLog('${b.id}','${l.at}','${l.groupId||""}')">📋 הצג לוג</button>` : ''}

async function refreshAllBrandGroups(brandId, brandName) {
  if (window.__refreshAllRunning) return; // guard against double-click
  window.__refreshAllRunning = true;

  // Disable the trigger button (can be multiple on screen — disable all matching)
  const triggerBtns = document.querySelectorAll('[onclick*="refreshAllBrandGroups"]');
  triggerBtns.forEach(btn => {
    btn.disabled = true;
    btn.dataset._origText = btn.innerHTML;
    btn.innerHTML = "⏳ מרענן...";
    btn.style.opacity = "0.6";
    btn.style.cursor = "not-allowed";
  });
  const reenable = () => {
    window.__refreshAllRunning = false;
    triggerBtns.forEach(btn => {
      btn.disabled = false;
      if (btn.dataset._origText) btn.innerHTML = btn.dataset._origText;
      btn.style.opacity = "";
      btn.style.cursor = "";
    });
  };

  const sessionKey = await ensureSessionKey();
  if (!sessionKey) { reenable(); alert("אין סשן מחובר"); return; }

  let modal = document.getElementById("refresh-all-modal");
  if (modal) modal.remove();
  modal = document.createElement("div");
  modal.id = "refresh-all-modal";
  modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px";
  modal.dataset.busy = "1";
  modal.onclick = e => { if (e.target === modal && !modal.dataset.busy) modal.remove(); };
  modal.innerHTML = `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:360px;max-width:720px;width:100%">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <h3 style="margin:0">🔄 רענון כל הקבוצות — ${esc(brandName)}</h3>
        <button class="btn-ghost" title="סגור — הריענון ימשיך ברקע" onclick="document.getElementById('refresh-all-modal').remove()">✕</button>
      </div>
      <div id="ra-summary" style="font-size:13px;color:var(--dim);margin-bottom:8px">מתחיל...</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden">
          <div id="ra-fill" style="height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .3s"></div>
        </div>
        <div id="ra-pct" style="font-size:12px;color:var(--dim);min-width:56px;text-align:left">0 / 0</div>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:8px">💡 אפשר לסגור את החלון — הריענון ממשיך בשרת וכל פעולה נרשמת ב📋 לוג</div>
      <div id="ra-log" style="max-height:380px;overflow-y:auto;background:var(--bg3);border-radius:8px;padding:10px;font-size:12px;font-family:monospace"></div>
    </div>`;
  document.body.appendChild(modal);
  const logEl = document.getElementById("ra-log");
  const sumEl = document.getElementById("ra-summary");
  const fillEl = document.getElementById("ra-fill");
  const pctEl = document.getElementById("ra-pct");
  const addLine = (html) => { logEl.innerHTML += html; logEl.scrollTop = logEl.scrollHeight; };

  let total = 0, done = 0;
  const tick = () => {
    if (!total) return;
    const pct = Math.min(100, Math.floor((done / total) * 100));
    fillEl.style.width = pct + "%";
    pctEl.textContent = `${done} / ${total}`;
  };

  try {
    const r = await fetch(`/api/brands/${brandId}/refresh-all`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionKey }),
    });
    if (!r.ok || !r.body) throw new Error(`HTTP ${r.status}`);
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { value, done: streamDone } = await reader.read();
      if (streamDone) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split("\n"); buf = lines.pop() || "";
      for (const line of lines) {
        if (!line.trim()) continue;
        let ev; try { ev = JSON.parse(line); } catch { continue; }
        if (ev.type === "start") {
          total = ev.total;
          sumEl.textContent = `מרענן ${ev.total} קבוצות...`;
          tick();
          addLine(`<div style="color:var(--cyan)">🚀 ${ev.total} קבוצות ב-${esc(ev.brand)}</div>`);
        } else if (ev.type === "group_start") {
          addLine(`<div style="color:var(--mute);margin-top:4px">⏳ [${ev.index}/${total}] ${esc(ev.groupId).slice(0,24)}...</div>`);
        } else if (ev.type === "group_done") {
          done++; tick();
          const parts = [];
          if (ev.joined) parts.push(`<span style="color:var(--green)">🟢 +${ev.joined}</span>`);
          if (ev.left) parts.push(`<span style="color:var(--red)">🔴 -${ev.left}</span>`);
          if (!parts.length) parts.push(`<span style="color:var(--dim)">ללא שינוי</span>`);
          addLine(`<div style="color:var(--green)">✓ [${ev.index}/${total}] <b>${esc(ev.groupName)}</b> · ${ev.total} חברים · ${parts.join(" ")}</div>`);
        } else if (ev.type === "group_error") {
          done++; tick();
          addLine(`<div style="color:var(--red)">✗ [${ev.index}/${total}] ${esc(ev.groupId).slice(0,24)} — ${esc(ev.error)}</div>`);
        } else if (ev.type === "done") {
          if (sumEl) sumEl.innerHTML = `✅ סיימתי — ${ev.successful} הצליחו${ev.failed ? `, ${ev.failed} נכשלו` : ""}. סה"כ: <b style="color:var(--green)">+${ev.totalJoined}</b> נכנסו · <b style="color:var(--red)">-${ev.totalLeft}</b> יצאו`;
          if (logEl) addLine(`<div style="color:var(--green);font-weight:700;margin-top:10px;padding:8px;background:rgba(37,211,102,0.15);border-radius:6px">✅ סיימתי</div>`);
          if (modal) delete modal.dataset.busy;
          reenable();
          tabLoadBrandDetail(true);
        }
      }
    }
  } catch (e) {
    if (logEl) addLine(`<div style="color:var(--red)">שגיאה: ${esc(e.message)}</div>`);
    if (modal) delete modal.dataset.busy;
    reenable();
  }
}

async function openRefreshAllLog(brandId, brandName) {
  try {
    const r = await (await fetch(`/api/brands/${brandId}/refresh-all-log`)).json();
    const log = r.log || [];
    const fmtTs = (ts) => ts ? new Date(ts).toLocaleString("he-IL") : "—";
    const runs = log.map((run, idx) => {
      const entries = (run.entries || []).map(e => `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:6px">${esc(e.groupName || e.groupId)}</td>
          <td style="padding:6px;color:${e.ok ? 'var(--green)' : 'var(--red)'}">${e.ok ? '✓' : '✗'}</td>
          <td style="padding:6px;color:var(--green)">${e.ok ? (e.joined ? '+' + e.joined : '—') : ''}</td>
          <td style="padding:6px;color:var(--red)">${e.ok ? (e.left ? '-' + e.left : '—') : ''}</td>
          <td style="padding:6px;color:var(--dim);font-size:11px">${e.ok ? (e.total || '') : esc(e.error || '')}</td>
        </tr>
      `).join("");
      return `
        <details ${idx === 0 ? 'open' : ''} style="margin-bottom:10px;background:var(--bg3);border-radius:8px;padding:10px">
          <summary style="cursor:pointer;font-weight:700;font-size:13px">
            ${fmtTs(run.at)} · ✓ ${run.successful}/${run.total}
            ${run.failed ? `<span style="color:var(--red)"> · ${run.failed} נכשלו</span>` : ''}
            · <span style="color:var(--green)">+${run.totalJoined}</span>
            / <span style="color:var(--red)">-${run.totalLeft}</span>
            ${run.clientDetached ? '<span style="color:var(--mute);font-size:11px"> · (נסגר ע"י המשתמש, רץ ברקע)</span>' : ''}
          </summary>
          <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
            <thead><tr style="background:var(--bg);font-size:11px;color:var(--dim)">
              <th style="padding:6px;text-align:right">קבוצה</th>
              <th style="padding:6px;text-align:right">מצב</th>
              <th style="padding:6px;text-align:right">נכנסו</th>
              <th style="padding:6px;text-align:right">יצאו</th>
              <th style="padding:6px;text-align:right">פרטים</th>
            </tr></thead>
            <tbody>${entries}</tbody>
          </table>
        </details>`;
    }).join("");

    let modal = document.getElementById("refresh-log-modal");
    if (modal) modal.remove();
    modal = document.createElement("div");
    modal.id = "refresh-log-modal";
    modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px";
    modal.onclick = e => { if (e.target === modal) modal.remove(); };
    modal.innerHTML = `
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:360px;max-width:820px;width:100%">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <h3 style="margin:0">📋 לוג רענון כל הקבוצות — ${esc(brandName)}</h3>
          <button class="btn-ghost" onclick="document.getElementById('refresh-log-modal').remove()">✕</button>
        </div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:10px">${log.length} ריצות שמורות (עד 50 אחרונות)</div>
        <div style="max-height:500px;overflow-y:auto">${runs || '<div class="empty">אין ריצות עדיין</div>'}</div>
      </div>`;
    document.body.appendChild(modal);
  } catch (e) { alert("שגיאה: " + e.message); }
}

async function openGroupDailyLog(groupId, groupName) {

    const r = await (await fetch(`/api/groups/${encodeURIComponent(groupId)}/daily-log`)).json();
    const log = r.log || [];
    const rows = log.map(e => {
      const net = e.joined - e.left;
      const netColor = net > 0 ? "var(--green)" : net < 0 ? "var(--red)" : "var(--dim)";
      const netLabel = net > 0 ? `+${net}` : `${net}`;
      const joinedSample = (e.joinedPhones || []).slice(0, 5).join(", ");
      const leftSample = (e.leftPhones || []).slice(0, 5).join(", ");
      const joinedRest = (e.joinedPhones || []).length > 5 ? ` +${e.joinedPhones.length - 5} נוספים` : "";
      const leftRest = (e.leftPhones || []).length > 5 ? ` +${e.leftPhones.length - 5} נוספים` : "";
      return `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:8px;white-space:nowrap">${e.date}</td>

          <td style="padding:8px;color:var(--red)" title="${esc(leftSample + leftRest)}">🔴 -${e.left}</td>
          <td style="padding:8px;color:${netColor};font-weight:700">${netLabel}</td>
          <td style="padding:8px;color:var(--dim);font-size:11px">${e.memberCount ?? '—'}</td>

    const totalJ = log.reduce((a, e) => a + e.joined, 0);

    let modal = document.getElementById("daily-log-modal");
    if (modal) modal.remove();
    modal = document.createElement("div");
    modal.id = "daily-log-modal";
    modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px";
    modal.onclick = e => { if (e.target === modal) modal.remove(); };
    modal.innerHTML = `
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:320px;max-width:720px;width:100%">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

async function openRemovalLog(brandId, at, groupId) {
  try {
    const r = await (await fetch(`/api/brands/${brandId}/removals-log`)).json();
    const runs = r.log || [];
    // Find the run closest to `at` (entry.at stored as ISO string in ms precision)
    const target = new Date(at).getTime();
    let best = null, bestDiff = Infinity;
    for (const run of runs) {
      const diff = Math.abs(new Date(run.at).getTime() - target);
      if (diff < bestDiff) { bestDiff = diff; best = run; }
    }
    if (!best) return alert("לא נמצאו פרטי הסרה");
    const events = best.events || [];
    const filtered = groupId ? events.filter(e => e.groupId === groupId) : events;
    const rows = filtered.map((e, i) => `

        <td style="padding:6px;color:var(--dim);font-size:11px">${i + 1}</td>
        <td style="padding:6px">${esc(e.phone || "—")}</td>
        <td style="padding:6px;color:${e.ok ? 'var(--green)' : 'var(--red)'}">${e.ok ? '✅ הוסר' : '❌ נכשל'}</td>
        <td style="padding:6px;font-size:11px;color:var(--dim)">${esc(e.error || e.groupName || "")}</td>

    let modal = document.getElementById("rlog-modal");
    if (modal) modal.remove();
    modal = document.createElement("div");
    modal.id = "rlog-modal";

      <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:320px;max-width:720px;width:100%">

            </thead>

          </table>

async function ensureSessionKey() {
  if (STATE.sessionKey) return STATE.sessionKey;
  if (!STATE.activeSession) {
    // find first connected session
    const r = await (await fetch("/api/sessions")).json();
    const connected = (r.sessions || []).find(s => ["connected","ready"].includes((s.status||"").toLowerCase()));
    if (!connected) return null;
    STATE.activeSession = connected.id;
    STATE.sessions = r.sessions;
  }
  const r = await (await fetch(`/api/sessions/${STATE.activeSession}/groups`)).json();
  if (r.sessionKey) STATE.sessionKey = r.sessionKey;
  if (r.groups) STATE.groups = r.groups;
  return STATE.sessionKey;
}

async function runRemoveDupsStream(brandId) {
  const modal = document.getElementById("rd-modal");
  const btn = document.getElementById("rd-start-btn");
  const statusEl = document.getElementById("rd-status");
  const logEl = document.getElementById("rd-log");
  if (!modal || !btn) { alert("UI error"); return; }
  if (modal.dataset.busy === "1") return;

  // Lock immediately to prevent double-click
  modal.dataset.busy = "1";
  btn.disabled = true;
  btn.style.opacity = "0.5";
  btn.style.cursor = "not-allowed";
  btn.textContent = "⏳ מאתחל...";
  statusEl.innerHTML = '<div class="loading"><div class="spinner"></div>מאתחל חיבור...</div>';

  let sessionKey;
  try {
    sessionKey = await ensureSessionKey();
  } catch (e) {
    statusEl.innerHTML = `<div class="error">שגיאה בטעינת session: ${esc(e.message)}</div>`;
    modal.dataset.busy = "";
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.textContent = "🗑 התחל הסרה";
    return;
  }
  if (!sessionKey) {
    statusEl.innerHTML = `<div class="error">סשן לא מחובר — כנס לטאב חיבור קודם</div>`;
    modal.dataset.busy = "";
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.textContent = "🗑 התחל הסרה";
    return;
  }

  btn.textContent = "⏳ פועל... אל תסגור";
  logEl.style.display = "block";
  logEl.innerHTML = "";
  statusEl.innerHTML = `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;color:var(--dim)">
        <span id="rd-progress-text">0/? · התחלה...</span>
        <span id="rd-success">✓ 0 · ✗ 0</span>
      </div>
      <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
        <div id="rd-bar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--red),#fbbf24,var(--green));transition:width 0.3s"></div>
      </div>
    </div>
  `;

  const addLine = (html) => { logEl.innerHTML += html; logEl.scrollTop = logEl.scrollHeight; };
  let successful = 0, failed = 0, total = 0;

  try {
    const r = await fetch(`/api/brands/${brandId}/remove-duplicates-stream`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionKey }),
      credentials: "include",
    });
    if (!r.ok) {
      const txt = await r.text();
      throw new Error(`server ${r.status}: ${txt.slice(0,200)}`);
    }
    if (!r.body) throw new Error("streaming not supported");
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";
      for (const line of lines) {
        if (!line.trim()) continue;
        let ev;
        try { ev = JSON.parse(line); } catch { continue; }
        if (ev.type === "start") {
          total = ev.totalOps;
          addLine(`<div style="color:var(--cyan)">🚀 מתחיל — ${ev.totalOps} פעולות ב-${ev.groups} קבוצות</div>`);
        } else if (ev.type === "group_start") {
          addLine(`<div style="color:var(--cyan);margin-top:6px;font-weight:700">▶ <b>${esc(ev.groupName)}</b> — ${ev.count} להסרה</div>`);
        } else if (ev.type === "removed") {
          successful++;
          addLine(`<div style="color:var(--green)">✓ <span style="font-family:monospace">${esc(ev.phone)}</span> → ${esc(ev.groupName)}</div>`);
          const pct = Math.floor((ev.processed / ev.totalOps) * 100);
          document.getElementById("rd-bar").style.width = pct + "%";
          document.getElementById("rd-progress-text").textContent = `${ev.processed}/${ev.totalOps}`;
          document.getElementById("rd-success").innerHTML = `<span style="color:var(--green)">✓ ${successful}</span> · <span style="color:var(--red)">✗ ${failed}</span>`;
        } else if (ev.type === "failed") {
          failed++;
          addLine(`<div style="color:var(--red)">✗ ${esc(ev.phone)} → ${esc(ev.groupName)} — ${esc(ev.error||"")}</div>`);
          const pct = Math.floor((ev.processed / ev.totalOps) * 100);
          document.getElementById("rd-bar").style.width = pct + "%";
          document.getElementById("rd-progress-text").textContent = `${ev.processed}/${ev.totalOps}`;
          document.getElementById("rd-success").innerHTML = `<span style="color:var(--green)">✓ ${successful}</span> · <span style="color:var(--red)">✗ ${failed}</span>`;
        } else if (ev.type === "group_done") {
          addLine(`<div style="color:var(--mute);font-size:11px">◼ סיום ${esc(ev.groupName)}</div>`);
        } else if (ev.type === "done") {
          addLine(`<div style="color:var(--green);font-weight:700;margin-top:10px;padding:8px;background:rgba(37,211,102,0.15);border-radius:6px">✅ סיימתי — ${ev.successful}/${ev.total} הצליחו${ev.failed?`, ${ev.failed} נכשלו`:""}</div>`);
          btn.textContent = "✓ סיים";
          btn.style.background = "var(--green)";
          btn.disabled = false;
          btn.style.opacity = "1";
          btn.onclick = () => { modal.remove(); tabLoadBrandDetail(true); };
        }
      }
    }
  } catch (e) {
    addLine(`<div class="error">${esc(e.message)}</div>`);
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.textContent = "🗑 נסה שוב";
    modal.dataset.busy = "";
  }
}

async function sendBrandBroadcast(brandId, brandName) {
  const modal = document.getElementById("bc-modal");
  const btn = document.getElementById("bc-send-btn");
  const statusEl = document.getElementById("bc-status");
  if (modal.dataset.busy === "1") return;
  const groupIds = [...document.querySelectorAll('#bc-groups input:checked')].map(c => c.dataset.gid);
  if (!groupIds.length) return alert("לא סומנה אף קבוצה");
  const text = document.getElementById("bc-text").value.trim();
  const mediaFile = document.getElementById("bc-media").files[0];
  if (!text && !mediaFile) return alert("כתוב טקסט או צרף מדיה");
  const delaySec = parseInt(document.getElementById("bc-delay").value) || 10;
  const sessionKey = await ensureSessionKey();
  if (!sessionKey) return alert("סשן לא מחובר — חזור לטאב קבוצות");

  modal.dataset.busy = "1";
  btn.disabled = true;
  btn.style.opacity = "0.5";
  btn.style.cursor = "not-allowed";
  btn.textContent = "⏳ שולח... אל תסגור";
  statusEl.innerHTML = '<div class="loading" style="padding:8px"><div class="spinner"></div>מכין שליחה...</div>';

  try {
    let mediaUrl = null, mediaType = null;
    if (mediaFile) {
      statusEl.innerHTML = '<div class="loading" style="padding:8px"><div class="spinner"></div>מעלה מדיה...</div>';
      const up = await fetch("/api/upload-media", {
        method: "POST",
        headers: { "Content-Type": mediaFile.type || "application/octet-stream" },
        body: mediaFile,
      });
      const upD = await up.json();
      if (!up.ok) throw new Error(upD.error || "upload failed");
      mediaUrl = upD.url;
      mediaType = upD.mediaType;
    }

    statusEl.innerHTML = `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px">
        <div id="bc-live-header" style="font-weight:700;margin-bottom:10px">📤 מתחיל שליחה ל-${groupIds.length} קבוצות (${delaySec}ש׳ בין כל אחת)...</div>
        <div id="bc-live-log" style="max-height:200px;overflow-y:auto;font-size:13px;line-height:1.7"></div>
      </div>
    `;
    const logEl = document.getElementById("bc-live-log");
    const headerEl = document.getElementById("bc-live-header");
    const addLine = (html) => { logEl.innerHTML += html; logEl.scrollTop = logEl.scrollHeight; };

    const r = await fetch(`/api/brands/${brandId}/broadcast-stream`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, sessionKey, groupIds, mediaUrl, mediaType, delayMs: delaySec * 1000 }),
    });
    if (!r.body) throw new Error("streaming not supported");
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let finalSummary = null;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";
      for (const line of lines) {
        if (!line.trim()) continue;
        let ev;
        try { ev = JSON.parse(line); } catch { continue; }
        if (ev.type === "start") {
          headerEl.textContent = `📤 שולח ל-${ev.total} קבוצות (${delaySec}ש׳ בין כל אחת)`;
        } else if (ev.type === "sending") {
          addLine(`<div style="color:var(--cyan)">⏳ [${ev.index}/${ev.total}] שולח ל-<b>${esc(ev.groupName)}</b>...</div>`);
        } else if (ev.type === "sent") {
          addLine(`<div style="color:var(--green)">✓ [${ev.index}/${ev.total}] נשלח ל-<b>${esc(ev.groupName)}</b></div>`);
        } else if (ev.type === "failed") {
          addLine(`<div style="color:var(--red)">✗ [${ev.index}/${ev.total}] נכשל ב-<b>${esc(ev.groupName)}</b> — ${esc(ev.error||"unknown")}</div>`);
        } else if (ev.type === "waiting") {
          addLine(`<div style="color:var(--mute);font-size:11px">⏱ ממתין ${Math.ceil(ev.waitMs/1000)}ש׳...</div>`);
        } else if (ev.type === "done") {
          finalSummary = ev;
          headerEl.innerHTML = `✅ <b>סיימתי</b> · נשלחו ${ev.sent}/${ev.total}${ev.failed?` · נכשלו ${ev.failed}`:""}`;
        }
      }
    }

    if (finalSummary) {
      btn.textContent = "✓ נשלח";
      btn.style.background = "var(--green)";
      // Keep modal open so user can see the full report
      addLine(`<div style="margin-top:10px;padding:8px;background:var(--bg2);border-radius:6px;color:var(--dim);font-size:12px">📜 הכל נרשם בלוג המותג</div>`);
    } else {
      throw new Error("stream ended without final status");
    }
  } catch (e) {
    statusEl.innerHTML = `<div class="error">${esc(e.message)}</div>`;
    modal.dataset.busy = "";
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.style.cursor = "pointer";
    btn.textContent = "📤 שלח דוור";
  }
}

async function loadSavedGroups() {

      fetch("/api/saved-groups").then(r => r.json()),
      fetch("/api/brands").then(r => r.json()),
    ]);
    STATE.brands = brandsR.brands || [];
    const groupToBrands = new Map();
    for (const b of STATE.brands) {
      for (const gid of b.groupIds) {
        if (!groupToBrands.has(gid)) groupToBrands.set(gid, []);
        groupToBrands.get(gid).push(b);
      }
    }
    loadBrandsForSavedTab();

    const el = document.getElementById("saved-list");
    if (!el) return;
    if (!savedR.groups?.length) { el.innerHTML = '<div class="empty">אין קבוצות שמורות. לחץ "💾 שמור" בעמוד חברים</div>'; return; }
    el.innerHTML = savedR.groups.map(g => {
      const currentBrands = groupToBrands.get(g.groupId) || [];
      const availableBrands = STATE.brands.filter(b => !b.groupIds.includes(g.groupId));
      const brandChips = currentBrands.length
        ? currentBrands.map(b => `<span style="background:${b.color||'var(--green)'};color:white;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:6px">🏷️ ${esc(b.name)} <span onclick="event.stopPropagation();removeGroupBrand('${b.id}','${g.groupId}')" style="cursor:pointer;opacity:0.7;margin-right:2px">✕</span></span>`).join(" ")

      const addBrandControl = availableBrands.length

             <option value="">➕ שייך למותג...</option>
             ${availableBrands.map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join("")}
           </select>`
        : (STATE.brands.length ? '' : '<span style="font-size:11px;color:var(--dim)">צור מותג למעלה כדי לשייך</span>');
      return `
        <div style="padding:14px;background:var(--bg3);border-radius:10px;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green2));display:flex;align-items:center;justify-content:center;font-size:22px">👥</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700">${esc(g.groupName)}</div>
              <div style="font-size:12px;color:var(--dim)">${g.memberCount} חברים · נשמר ${new Date(g.savedAt).toLocaleString("he-IL")}</div>
            </div>
            <button class="btn-green" onclick="loadSavedGroup('${esc(g.file)}')">📂 פתח</button>
            <button class="btn-ghost" onclick="archiveSavedGroup('${esc(g.file)}','${esc(g.groupName)}')" title="העבר לארכיון">📦</button>
          </div>
          <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            ${brandChips}
            ${addBrandControl}
          </div>
        </div>
      `;
    }).join("");
  } catch (e) {
    document.getElementById("saved-list").innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

async function checkValidity() {
  const phones = STATE.members.map(m => m._phone).filter(Boolean);
  if (!phones.length) return alert("אין מספרים");
  const progressEl = document.getElementById("enrich-progress");
  progressEl.style.display = "block";
  progressEl.innerHTML = `
    <div style="font-size:12px;color:var(--dim);margin-bottom:6px">✅ בודק תקינות... <span id="val-text">0/${phones.length}</span></div>
    <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div id="val-fill" style="height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width 0.3s"></div></div>
  `;
  const r = await fetch("/api/check-validity", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sessionKey: STATE.sessionKey, phones }),
  });
  const { id } = await r.json();
  const interval = setInterval(async () => {
    const j = await (await fetch(`/api/check-validity-status/${id}`)).json();
    const pct = Math.floor((j.done / j.total) * 100);
    document.getElementById("val-fill").style.width = pct + "%";
    document.getElementById("val-text").textContent = `${j.done}/${j.total} · ✓${j.active} ✗${j.inactive}`;
    const map = new Map(j.results.map(r => [r.phone, r.exists]));
    STATE.members = STATE.members.map(m => ({ ...m, active: map.has(m._phone) ? map.get(m._phone) : m.active }));
    renderMembersTable();
    if (j.status === "done") {
      clearInterval(interval);
      progressEl.innerHTML = `<div class="success">✅ בדיקה הושלמה · ${j.active} פעילים · ${j.inactive} לא פעילים · ${j.errors} שגיאות</div>`;
      setTimeout(() => { progressEl.style.display = "none"; }, 4000);
    }
  }, 1500);
}

async function importContactsCSV() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".csv,.txt";
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const txt = await file.text();
    // Expect: phone,name OR name,phone
    const contacts = txt.split(/\n+/).map(line => {
      const parts = line.split(",").map(s => s.trim().replace(/^"|"$/g, ""));
      if (parts.length < 2) return null;
      // Detect which column is phone
      const isPhone1 = /^\+?\d[\d\s\-]{7,}$/.test(parts[0]);
      return isPhone1 ? { phone: parts[0], name: parts[1] } : { phone: parts[1], name: parts[0] };
    }).filter(Boolean);
    const r = await fetch("/api/local-contacts/bulk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contacts }),
    });
    const data = await r.json();
    flash(`✅ יובאו ${data.added} שמות (סה"כ: ${data.total})`);
    enrichMembers();
  };
  input.click();
}

  renderMembersTable();
}

async function saveCurrentGroup() {
  if (!STATE.members.length) return alert("אין חברים לשמור");
  // Use smart save — merges delta, dedup by phone
  const r = await fetch("/api/save-group-delta", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      groupId: STATE.selectedGroup,
      groupName: STATE.selectedGroupName,
      members: STATE.members,
      metadata: { savedAt: new Date().toISOString() },
    }),
  });
  const data = await r.json();
  if (data.ok) {
    if (data.new_added > 0 && data.previous_count > 0) {
      flash(`✅ נוספו ${data.new_added} חדשים (סה"כ ${data.total}, היו ${data.previous_count})`);
    } else if (data.new_added > 0) {
      flash(`✅ נשמרו ${data.new_added} חברים`);
    } else {
      flash(`ℹ️ אין חדשים — הכל כבר היה שמור (${data.total})`);
    }
  } else alert("שגיאה: " + data.error);
}

function selectIgEngine(id) {

async function saveIgConfig() {
  const authType = document.querySelector('input[name="ig-auth"]:checked')?.value;
  const el = document.getElementById("ig-status");
  let payload;
  if (authType === "token") {
    const engine = document.querySelector('input[name="ig-engine"]:checked')?.value;
    const token = document.getElementById("ig-token").value.trim();
    if (!engine || !token) { alert("בחר ספק + הזן token"); return; }
    payload = { authType: "token", engine, token };
  } else if (authType === "userpass") {
    const username = document.getElementById("ig-username").value.trim().replace(/^@/, "");
    const password = document.getElementById("ig-password").value.trim();
    const twoFa = document.getElementById("ig-2fa").value.trim();
    if (!username || !password) { alert("הזן username + password"); return; }
    payload = { authType: "userpass", engine: "instagrapi", username, password, twoFa };
  } else { alert("בחר שיטת אימות"); return; }

  el.innerHTML = '<div class="loading"><div class="spinner"></div>בודק חיבור...</div>';
  try {
    const r = await fetch("/api/ig/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (data.ok) el.innerHTML = `<div class="success">✅ מחובר: ${data.account || "OK"}</div>`;
    else el.innerHTML = `<div class="error">${data.error || "חיבור נכשל"}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

async function fetchIgFollowers(type) {

async function loadSessions(force) {
  const el = document.getElementById("sessions-list");
  if (el) el.innerHTML = '<div class="loading"><div class="spinner"></div>טוען...</div>';
  try {
    const r = await (await fetch("/api/sessions" + (force ? "?refresh=1" : ""))).json();
    STATE.sessions = r.sessions || [];
    const meta = document.getElementById("sessions-meta");
    if (meta && r.updatedAt) {
      const t = new Date(r.updatedAt).toLocaleString("he-IL");
      meta.innerHTML = `🕒 עודכן לאחרונה: <b>${t}</b> · רענון אוטומטי כל שעה${r.stale ? ' · <span style="color:#fbbf24">⚠️ נתונים ישנים (השרת נכשל)</span>' : ''}`;
    }
    const el2 = document.getElementById("sessions-list");
    if (!el2) return;
    if (!STATE.sessions.length) { el2.innerHTML = '<div class="empty">אין חשבונות. צור חדש או הוסף API key ב-.env</div>'; return; }
    el2.innerHTML = STATE.sessions.map(s => {
      const connected = (s.status||"").toLowerCase() === "connected" || (s.status||"").toLowerCase() === "ready";
      return `
        <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border-radius:10px;margin-bottom:8px;border:1px solid ${connected?'var(--green)':'var(--border)'}">
          <div class="dot ${connected?'on':'off'}"></div>
          <div style="flex:1">
            <div style="font-weight:700">${esc(s.name||"Session")} ${s.phone_number?'('+s.phone_number+')':''}</div>
            <div style="font-size:12px;color:var(--dim)">ID: ${s.id} · Status: ${s.status||'—'}</div>
          </div>
          <div style="display:flex;gap:6px">
            ${connected
              ? `<button class="btn-green" onclick="selectSession(${JSON.stringify(s.id)})">📋 טען קבוצות</button>
                 <button class="btn-ghost" onclick="disconnectSession(${JSON.stringify(s.id)})">נתק</button>`
              : `<button class="btn-green" onclick="connectSession(${JSON.stringify(s.id)})">חבר (QR)</button>`
            }
          </div>
        </div>
      `;
    }).join("");
  } catch (e) {
    const el3 = document.getElementById("sessions-list");
    if (el3) el3.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

                ${l.total - l.connected > 0 ? `<span style="color:var(--red);margin-right:10px">✗ ${l.total-l.connected} לא מחוברים</span>` : ''}
              </div>
              ${l.sessions.map(s => `<div style="color:${['connected','ready'].includes((s.status||'').toLowerCase())?'var(--green)':'var(--red)'};font-size:11px;margin-top:2px">• ${esc(s.name||'?')} (${esc(s.phone||'?')}) — ${esc(s.status||'unknown')}</div>`).join('')}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

async function connectSession(id) {
  const el = document.getElementById("sessions-list");
  el.innerHTML += `<div id="qr-area" class="qr-wrap"><div class="loading"><div class="spinner"></div>מייצר QR...</div></div>`;
  const r = await (await fetch(`/api/sessions/${id}/connect`, { method: "POST" })).json();
  const qrData = r.data?.qrCode || r.data?.qr || r.data?.data?.qrCode;
  const qrArea = document.getElementById("qr-area");
  if (!qrData) {
    qrArea.innerHTML = `<div class="error">לא התקבל QR. סטטוס: ${r.data?.status || JSON.stringify(r).slice(0,200)}</div>`;
    return;
  }
  if (qrData.startsWith("data:image")) {
    qrArea.innerHTML = `<img src="${qrData}" style="max-width:280px;border-radius:12px;background:white;padding:16px" /><p style="margin-top:10px;color:var(--dim)">📱 סרוק עם WhatsApp</p>`;
  } else {
    qrArea.innerHTML = `<div id="qr-div" style="display:inline-block;background:white;padding:16px;border-radius:12px"></div><p style="margin-top:10px;color:var(--dim)">📱 סרוק עם WhatsApp</p><button class="btn-ghost" style="margin-top:10px" onclick="connectSession('${id}')">🔄 QR חדש</button>`;
    try {
      new QRCode(document.getElementById("qr-div"), {
        text: qrData,
        width: 260,
        height: 260,
        colorDark: "#000000",
        colorLight: "#ffffff",
      });
    } catch (e) {
      qrArea.innerHTML = `<div class="error">QR render failed: ${e.message}</div>`;
    }
  }
  // Poll for connection
  let polls = 0;
  const pollInterval = setInterval(async () => {
    polls++;
    if (polls > 30) { clearInterval(pollInterval); return; }
    try {
      const s = await (await fetch(`/api/sessions/${id}/status`)).json();
      const status = (s.data?.status || s.status || "").toLowerCase();
      if (status === "connected" || status === "ready") {
        clearInterval(pollInterval);
        qrArea.innerHTML = `<div class="success">✅ מחובר! טוען קבוצות...</div>`;
        setTimeout(() => { loadSessions(); selectSession(id); }, 1500);
      }
    } catch {}
  }, 3000);
}

let _searchTimer = null;
function debouncedGroupsSearch(v) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    STATE.groupsSearch = v;
    STATE.groupsPage = 1;
    renderGroupsGrid();
    const input = document.getElementById("groups-search");

async function checkAdminStatus() {
  const before = STATE.groups.filter(g => g.iAmAdmin).length;
  flash("👑 בודק אדמין בכל הקבוצות...");
  await loadGroups(true);
  const after = STATE.groups.filter(g => g.iAmAdmin).length;
  const totalGroups = STATE.groups.length;
  const diff = after - before;
  let msg = `👑 אתה אדמין ב-${after}/${totalGroups} קבוצות`;
  if (diff > 0) msg += ` · ➕ התווספו ${diff} חדשות`;
  else if (diff < 0) msg += ` · ➖ הוסרו ${Math.abs(diff)}`;

async function loadGroups(force) {
  const el = document.getElementById("groups-grid");
  if (el) el.innerHTML = '<div class="group-grid">' + Array(6).fill('<div class="skeleton skeleton-card"></div>').join('') + '</div>';
  try {
    const r = await (await fetch(`/api/sessions/${STATE.activeSession}/groups` + (force ? "?refresh=1" : ""))).json();
    STATE.groups = r.groups || [];
    STATE.sessionKey = r.sessionKey || null;
    STATE.groupsPage = 1;
    const meta = document.getElementById("groups-meta");
    if (meta && r.updatedAt) {
      meta.innerHTML = `🕒 עודכן: <b>${new Date(r.updatedAt).toLocaleString("he-IL")}</b> · רענון אוטומטי כל שעה${r.cached ? " · 💾 מקאש" : ""} · ${STATE.groups.length} קבוצות`;
    }
    renderGroupsGrid();
    return;
  } catch (e) {
    const el3 = document.getElementById("groups-grid");
    if (el3) el3.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function renderGroupsGrid() {
    const el2 = document.getElementById("groups-grid");
    if (!el2) return;
    if (!STATE.groups.length) { el2.innerHTML = '<div class="empty">לא נמצאו קבוצות</div>'; return; }

    // Filter by search
    const q = (STATE.groupsSearch || "").toLowerCase();
    const filteredRaw = q
      ? STATE.groups.filter(g => ((g.subject||g.name||"") + " " + (g.desc||g.description||"")).toLowerCase().includes(q))
      : STATE.groups;
    // Sort newest-created first (WhatsApp creation timestamp). Groups missing
    // the field fall to the bottom so recently-created ones surface on top.
    const filtered = [...filteredRaw].sort((a, b) => {
      const ca = Number(a.creation) || 0;
      const cb = Number(b.creation) || 0;
      return cb - ca;
    });

    const totalPages = Math.max(1, Math.ceil(filtered.length / GROUPS_PER_PAGE));
    if (STATE.groupsPage > totalPages) STATE.groupsPage = 1;
    const start = (STATE.groupsPage - 1) * GROUPS_PER_PAGE;
    const pageItems = filtered.slice(start, start + GROUPS_PER_PAGE);

    const searchBox = `<input id="groups-search" placeholder="🔍 חפש קבוצה..." value="${esc(STATE.groupsSearch||"")}" style="width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:12px" oninput="debouncedGroupsSearch(this.value)" />`;

    let paginator = "";
    if (totalPages > 1) {
      paginator = `
        <div style="display:flex;justify-content:center;align-items:center;gap:6px;margin-top:16px;flex-wrap:wrap">
          <button class="btn-ghost" onclick="STATE.groupsPage=Math.max(1,STATE.groupsPage-1);renderGroupsGrid()" ${STATE.groupsPage<=1?'disabled style="opacity:0.4"':''}>← הקודם</button>
          <span style="padding:0 12px;color:var(--dim);font-size:13px">עמוד ${STATE.groupsPage}/${totalPages} · ${filtered.length} קבוצות</span>
          <button class="btn-ghost" onclick="STATE.groupsPage=Math.min(${totalPages},STATE.groupsPage+1);renderGroupsGrid()" ${STATE.groupsPage>=totalPages?'disabled style="opacity:0.4"':''}>הבא →</button>
        </div>
      `;
    }

    el2.classList.remove("group-grid");
    el2.innerHTML = searchBox + `<div class="group-grid">` + pageItems.map(g => {
      const gid = g.id || g.jid || g.groupId;
      const name = g.subject || g.name || gid || "—";
      const img = g.imgUrl || g.picture;
      const size = g.size || g.participants?.length;

      let deltaBadge = "";
      if (g.saved && size && size > 0) {
        const delta = size - g.savedMemberCount;
        if (delta > 0) deltaBadge = `<span style="background:rgba(245,158,11,0.2);color:#fbbf24;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700" title="נוספו חדשים">🆕 +${delta}</span>`;
        else if (delta < 0) deltaBadge = `<span style="background:rgba(239,68,68,0.15);color:#fca5a5;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600">−${Math.abs(delta)}</span>`;
      }
      const savedBadge = g.saved ? `<span style="background:rgba(34,211,238,0.15);color:var(--cyan);padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600">💾 נשמר</span>` : "";
      const adminBadge = g.iAmAdmin ? `<span style="background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#111;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700" title="אתה אדמין בקבוצה">👑 אדמין</span>` : "";

      // Creation timestamp is WhatsApp UNIX seconds; savedAt is our ISO string
      const fmtAgo = (ms) => {
        if (!ms) return null;
        const diff = Date.now() - ms;
        const m = Math.floor(diff / 60000);
        if (m < 1) return "עכשיו";
        if (m < 60) return `לפני ${m} דק'`;
        const h = Math.floor(m / 60);
        if (h < 24) return `לפני ${h} שע'`;
        const d = Math.floor(h / 24);
        return `לפני ${d} ימים`;
      };
      const creationMs = g.creation ? Number(g.creation) * 1000 : null;
      const savedMs = g.savedAt ? new Date(g.savedAt).getTime() : null;
      const createdLine = creationMs
        ? `<span title="${new Date(creationMs).toLocaleString('he-IL')}">🗓 נוצרה ${fmtAgo(creationMs)}</span>`
        : "";
      const savedLine = savedMs
        ? `<span title="${new Date(savedMs).toLocaleString('he-IL')}">💾 נשמרה ${fmtAgo(savedMs)}</span>`
        : `<span style="color:var(--mute)">💾 לא נשמרה</span>`;

      return `
        <div class="group-card" onclick='selectGroup(${JSON.stringify(gid)})'>
          <div style="display:flex;align-items:center;gap:12px">
            ${img ? `<img src="${esc(img)}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0" />` : '<div style="width:48px;height:48px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">👥</div>'}
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(name)}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap">
                ${size ? `<span style="color:var(--green);font-weight:700;font-size:13px">${size} חברים</span>` : '<span style="color:var(--mute);font-size:12px">— חברים</span>'}
                ${adminBadge}
                ${savedBadge}
                ${deltaBadge}
              </div>
              <div style="display:flex;align-items:center;gap:10px;margin-top:6px;font-size:11px;color:var(--dim);flex-wrap:wrap">
                ${createdLine}
                ${savedLine}
              </div>
            </div>
          </div>
          ${(g.desc || g.description) ? `<div style="font-size:11px;color:var(--mute);margin-top:8px;line-height:1.4;max-height:30px;overflow:hidden">${esc((g.desc||g.description).slice(0,80))}</div>` : ""}
        </div>
      `;
    }).join("") + `</div>` + paginator;
}

async function loadMembers(force) {
  const el = document.getElementById("members-table");
  if (el) el.innerHTML = '<div class="loading"><div class="spinner"></div>טוען חברים...</div>';
  try {
    const sessionKey = STATE.sessionKey || "";
    const params = new URLSearchParams();
    if (sessionKey) params.set("sessionKey", sessionKey);
    if (force) params.set("refresh", "1");
    const qs = params.toString() ? "?" + params.toString() : "";
    const r = await (await fetch(`/api/sessions/${STATE.activeSession}/groups/${encodeURIComponent(STATE.selectedGroup)}/participants${qs}`)).json();
    STATE.members = (r.participants || []).map(m => ({ ...m, _phone: (m.pn || m.jid || m.id || "").replace("@c.us","").replace("@s.whatsapp.net","") }));
    STATE.selectedMembers = new Set();
    const meta = document.getElementById("members-meta");
    if (meta && r.updatedAt) {
      meta.innerHTML = `🕒 עודכן: <b>${new Date(r.updatedAt).toLocaleString("he-IL")}</b> · רענון אוטומטי כל שעה${r.cached ? " · 💾 מקאש" : ""}`;
    }
    renderMembersTable();
    setTimeout(enrichMembers, 200);
  } catch (e) {
    const el2 = document.getElementById("members-table");
    if (el2) el2.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

async function enrichMembers() {
  const phones = STATE.members.map(m => m._phone).filter(Boolean);
  if (!phones.length) return;
  const sessionKey = STATE.sessionKey || "";

  // Insert progress bar
  const progressEl = document.getElementById("enrich-progress");
  if (progressEl) {
    progressEl.style.display = "block";
    progressEl.innerHTML = `
      <div style="font-size:12px;color:var(--dim);margin-bottom:6px">🔄 מעשיר פרטים (תמונות + שמות)... <span id="enr-text">0/${phones.length}</span></div>
      <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div id="enr-fill" style="height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width 0.3s"></div></div>
    `;
  }

  const r = await fetch("/api/enrich-members", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sessionKey, phones, groupName: STATE.selectedGroupName, autoLabel: false }),
  });
  const { id } = await r.json();

  const interval = setInterval(async () => {
    const j = await (await fetch(`/api/enrich-status/${id}`)).json();
    const pct = Math.floor((j.done / j.total) * 100);
    const fill = document.getElementById("enr-fill");
    const txt = document.getElementById("enr-text");
    if (fill) fill.style.width = pct + "%";
    if (txt) txt.textContent = `${j.done}/${j.total}`;

    // Merge results into members
    const map = new Map(j.results.map(r => [r.phone, r]));
    STATE.members = STATE.members.map(m => ({ ...m, ...(map.get(m._phone) || {}) }));
    renderMembersTable();

    if (j.status === "done") {
      clearInterval(interval);
      if (progressEl) {
        progressEl.innerHTML = `<div class="success">✅ הועשרו ${j.done} חברים</div>`;
        setTimeout(() => { progressEl.style.display = "none"; }, 3000);
      }
    }
  }, 1500);
}

}

function toggleMember(phone, checked) {
  if (checked) STATE.selectedMembers.add(phone); else STATE.selectedMembers.delete(phone);
  updateSelCount();
}

function selectAllMembers() {
  STATE.members.forEach(m => {
    const phone = (m.id||m.phone||"").replace("@c.us","").replace("@s.whatsapp.net","");
    if (phone) STATE.selectedMembers.add(phone);
  });
  renderMembersTable();
}

function deselectAllMembers() { STATE.selectedMembers = new Set(); renderMembersTable(); }

function updateSelCount() {
  const el = document.getElementById("sel-count");
  if (el) el.textContent = STATE.selectedMembers.size;
}

function goToSendSelected() {
  if (!STATE.selectedMembers.size) return alert("בחר חברים קודם");
  switchTab("send");
}

async function exportExcel() {
  try {
    const r = await fetch("/api/export-excel", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ groupName: STATE.selectedGroupName, participants: STATE.members }),
    });
    const data = await r.json();
    if (data.url) {
      const a = document.createElement("a");
      a.href = data.url;
      a.download = data.filename;
      a.click();
      flash(`✅ יוצא ${data.rows} שורות ל-Excel`);
    } else {
      alert("Export error: " + (data.error || "unknown"));
    }
  } catch (e) {
    alert("Export failed: " + e.message);
  }
}

// ========== SEND TAB ==========
function renderSend() {
  const nums = [...STATE.selectedMembers];
  return `
    <div class="card">
      <h2>✉️ שליחת הודעה</h2>
      <div class="selected-count">${nums.length ? `${nums.length} נמענים נבחרו` : 'לא נבחרו נמענים — בחר מטאב חברים או הקלד מספרים'}</div>
      <label>נמענים (מספר בכל שורה)</label>
      <textarea id="send-numbers" placeholder="972501234567&#10;972509876543">${nums.join("\n")}</textarea>
      <label>הודעה</label>
      <textarea id="send-text" placeholder="שלום, ..."></textarea>
      <label>השהייה בין הודעות (מילישניות)</label>
      <input id="send-delay" type="number" value="3000" min="2000" />
      <button class="btn-green" onclick="sendBroadcast()" style="width:100%;padding:14px;font-size:15px;margin-top:8px">📤 שלח לכולם</button>
      <div id="send-result"></div>
    </div>
  `;
}

async function sendBroadcast() {
  const numbers = document.getElementById("send-numbers").value.trim().split(/\n+/).map(n=>n.trim()).filter(Boolean);
  const text = document.getElementById("send-text").value.trim();
  const delayMs = parseInt(document.getElementById("send-delay").value) || 3000;
  if (!numbers.length || !text) return alert("נמענים + הודעה נדרשים");

  const el = document.getElementById("send-result");
  el.innerHTML = '<div class="loading"><div class="spinner"></div>שולח...</div>';

  try {
    const session = STATE.sessions.find(s => (s.status||"").toLowerCase() === "connected" || (s.status||"").toLowerCase() === "ready");
    const r = await fetch("/api/broadcast", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ numbers, text, delayMs, sessionApiKey: session?.api_key }),
    });
    const data = await r.json();
    el.innerHTML = `<div class="success">✅ נשלחו: ${data.sent}/${data.total} · נכשלו: ${data.failed}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

// ========== HEALTH ==========
async function checkHealth() {
  document.getElementById("health-text").textContent = "בודק...";
  try {
    const r = await (await fetch("/api/health")).json();
    document.getElementById("health-dot").className = `dot ${r.online ? "on" : "off"}`;
    document.getElementById("health-text").textContent = r.online ? `מחובר (${r.connected_sessions}/${r.total_sessions})` : r.error || "לא מחובר";
  } catch (e) {
    document.getElementById("health-dot").className = "dot off";
    document.getElementById("health-text").textContent = "שגיאה";
  }
}

// ========== UTILS ==========
function esc(s) { return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function flash(msg, duration = 2000) {
  const n = document.createElement("div");
  n.textContent = msg;
  n.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.5)";
  document.body.appendChild(n);
  setTimeout(() => n.remove(), duration);
}

// ========== INIT ==========
// ========== KEYBOARD SHORTCUTS ==========
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
  if (e.key === "/") { e.preventDefault(); const s = document.getElementById("groups-search"); if (s) s.focus(); }
  if (e.key === "r" && !e.ctrlKey && !e.metaKey) {
    if (STATE.tab === "groups") loadGroups(true);
    else if (STATE.tab === "connect") loadSessions(true);
    else if (STATE.tab === "brands" && STATE.activeBrandId) tabLoadBrandDetail(true);
  }
  if (e.key === "g") switchTab("groups");
  if (e.key === "b") switchTab("brands");
  if (e.key === "c") switchTab("connect");
  if (e.key === "Escape") {
    const modal = document.getElementById("bc-modal") || document.getElementById("members-modal") || document.getElementById("prompt-modal");
    if (modal) modal.remove();
  }
});

// ========== UNDO SYSTEM ==========
function showUndo(message, undoFn, timeoutMs = 8000) {
  const toast = document.createElement("div");
  toast.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);padding:12px 18px;border-radius:10px;font-size:13px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.5);border:1px solid var(--border);display:flex;align-items:center;gap:14px";
  toast.innerHTML = `<span>${esc(message)}</span><button class="btn-ghost" style="padding:4px 12px;font-size:12px">↶ בטל</button>`;
  toast.querySelector("button").onclick = async () => { toast.remove(); try { await undoFn(); flash("✓ בוטל"); } catch (e) { alert("undo failed: " + e.message); } };
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), timeoutMs);
}

applyHash();
checkHealth();
setTimeout(loadSessions, 500);
</script>
</body>
</html>
